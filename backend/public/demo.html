<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Analytics Demo</title>

    <!-- Tracker Script -->
    <script async src="/tracker.js"></script>

    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background: #f4f6f8;
      }

      header {
        background: #1e293b;
        color: white;
        padding: 16px;
        text-align: center;
      }

      .container {
        padding: 20px;
      }

      .card {
        background: white;
        padding: 20px;
        margin-bottom: 20px;
        border-radius: 8px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
      }

      button {
        padding: 10px 16px;
        margin: 10px 5px;
        border: none;
        background: #3b82f6;
        color: white;
        border-radius: 6px;
        cursor: pointer;
      }

      button:hover {
        background: #2563eb;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
      }

      .box {
        height: 120px;
        background: #e2e8f0;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }

      .box:hover {
        background: #cbd5f5;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>User Analytics Demo Page</h1>
      <p>Click anywhere to generate tracking events</p>
    </header>

    <div class="container">
      <!-- Buttons Section -->
      <div class="card">
        <h2>Buttons Section</h2>
        <button onclick="alert('Primary Button Clicked')">
          Primary Button
        </button>
        <button onclick="alert('Secondary Button Clicked')">
          Secondary Button
        </button>
        <button onclick="alert('CTA Clicked')">Call To Action</button>
      </div>

      <!-- Grid Section -->
      <div class="card">
        <h2>Clickable Grid</h2>
        <div class="grid">
          <div class="box">Box 1</div>
          <div class="box">Box 2</div>
          <div class="box">Box 3</div>
          <div class="box">Box 4</div>
          <div class="box">Box 5</div>
          <div class="box">Box 6</div>
        </div>
      </div>

      <!-- Links Section -->
      <div class="card">
        <h2>Navigation Links</h2>
        <a href="#section1">Go to Section 1</a><br /><br />
        <a href="#section2">Go to Section 2</a><br /><br />
        <a href="https://example.com" target="_blank">External Link</a>
      </div>

      <!-- Scroll Sections -->
      <div id="section1" class="card" style="height: 300px">
        <h2>Section 1</h2>
        <p>Scroll and click here</p>
      </div>

      <div id="section2" class="card" style="height: 300px">
        <h2>Section 2</h2>
        <p>More interaction area</p>
      </div>
    </div>
  </body>
</html>
